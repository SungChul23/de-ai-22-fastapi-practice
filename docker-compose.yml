# 각각의 서비스 주체들이 구성-> 각 주체는 컨테이너임
services:
  # fastapi 기반으로 작성된 백엔드 코드, was 담당
  app:
    # Docker Hub에서 이미 빌드된 이미지를 그대로 pull 받아서 사용
    image: kimsam0923/fastapi-app:1.1 # 추후 env로 관리 
    container_name: fastapi_app
    restart: unless-stopped
    ports:
      - "8000:8000"
    # Dockerfile의 CMD or ENTRYPOINT + CMD => 데몬 띠우기와 동일한 의미
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    # volumes 제거함: 이미지 안에 이미 소스코드(main.py 등)가 포함되어 있으므로
    # 호스트의 ./app 폴더로 덮어쓰면(바인드 마운트) 오히려 이미지 내용이 사라질 수 있음
    networks:
      - my-net

  # nginx 리버스 프록시 서비스 -> web 서버 담당
  # 클라이언트 요청 => nginx 대응 => 해당 요청을 was쪽으로 프록시(전달), 80포트로만 대응
  # 향후 클라우드에서 80만 오픈 (외부망에는 이 컨테이너만 연결)
  proxy:
    image: kimsam0923/nginx-proxy:1.0
    container_name: nginx_proxy
    restart: unless-stopped
    # 프록시할 포트
    ports:    
      - "80:80"
    # volumes 제거함: Dockerfile에서 이미 web.conf를 이미지 안에 COPY 해뒀으므로
    # 별도로 호스트 파일을 마운트할 필요 없음 (EC2에 web.conf 파일이 없어도 됨)
    networks:
      - my-net
    depends_on:      
      - app

# 네트워크 -> 각 컨테이너들이 연결되는 포인트
networks:
  my-net:
    driver: bridge