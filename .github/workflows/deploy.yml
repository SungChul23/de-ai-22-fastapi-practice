name: Push 기반 CI/CD 테스트

# container 브랜치에서 push 이벤트(리슨->on)가 발생되면 아래 설정한 내용되고 작동한다!!

on:

  push:

    branches: [ "docker" ]

jobs:

  # app 관련 이미지 생성 허브에 푸시 (소스코드/리소스 모두 포함되어 있음)

  ci:

    runs-on:  ubuntu-latest

    steps:

      # 체크아웃, 소스코드를 ci서버에 다운

      - name: 코드 checkout

        uses: actions/checkout@v3

      

      # 도커허브 로그인 -> ID/PW

      # 시크릿 변수로 DOCKER_USERNAME, DOCKER_PASSWORD 생성

      - name: Docker hub login

        uses: docker/login-action@v2

        with:

          username: ${{ secrets.DOCKER_USERNAME }}

          password: ${{ secrets.DOCKER_PASSWORD }}
          
      # fastapi app 에 대한 이미지 빌드 푸시 동시진행
      - name: Build and Push fastapi app
        uses: docker/build-push-action@v4
        with:
          context: ./app
          file: ./app/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/fastapi-app:1.1
  
      - name : Build and Push nginx
        uses: docker/build-push-action@v4
        with:
          context: ./nginx
          file: ./nginx/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/nginx-proxy:1.0

  # EC2에 docker-compose.yml, 설정파일등 copy, 도커컴포즈 작동

  cd:
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - name: Pull latest images & restart containers on EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            cd ~/projects
            docker compose pull
            docker compose up -d --force-recreate
            docker compose ps 