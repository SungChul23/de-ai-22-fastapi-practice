name: Push 기반 CI/CD 테스트

# container 브랜치에서 push 이벤트(리슨->on)가 발생되면 아래 설정한 내용되고 작동한다!!
on:
  push:
    branches: [ "docker" ]

jobs:
  # app 관련 이미지 생성 허브에 푸시 (소스코드/리소스 모두 포함되어 있음)
  ci:
    runs-on:  ubuntu-latest

    steps:
      # 체크아웃, 소스코드를 ci서버에 다운
      - name: 코드 checkout
        uses: actions/checkout@v3

      # 도커허브 로그인 -> ID/PW
      # 시크릿 변수로 DOCKER_USERNAME, DOCKER_PASSWORD 생성
      - name: Docker hub login
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # fastapi app 에 대한 이미지 빌드 푸시 동시진행
      - name: Build and Push fastapi app
        uses: docker/build-push-action@v4
        with:
          context: ./app
          file: ./app/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/fastapi-app:1.1

      - name: Build and Push nginx
        uses: docker/build-push-action@v4
        with:
          context: ./nginx
          file: ./nginx/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/nginx-proxy:1.0

  # EC2에 docker-compose.yml을 복사한 다음, 그 파일 기준으로 pull + 재시작
  cd:
    needs: ci
    runs-on: ubuntu-latest
    steps:
      # 1. 최신 코드(docker-compose.yml 포함)를 CI 서버에 체크아웃
      - name: 코드 checkout
        uses: actions/checkout@v3

      # 2. docker-compose.yml을 EC2의 ~/projects 로 복사 (이게 빠져있던 부분)
      - name: Copy docker-compose.yml to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.EC2_KEY }}
          port: 22
          source: "docker-compose.yml"
          target: "/home/ubuntu/projects"

      # 3. EC2에 SSH 접속해서, 방금 복사된 최신 compose 파일 기준으로 이미지 pull + 컨테이너 재생성
      - name: Pull latest images & restart containers on EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            cd ~/projects
            docker compose pull
            docker compose up -d --force-recreate
            docker compose ps